<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
    <defs>
        <pattern id="lc-grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="1"/>
        </pattern>
        <marker id="arrow-neutral" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 1 L 9 5 L 0 9 z" fill="#64748B" />
        </marker>
        <marker id="arrow-success" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 1 L 9 5 L 0 9 z" fill="#10B981" />
        </marker>
        <marker id="arrow-danger" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 1 L 9 5 L 0 9 z" fill="#EF4444" />
        </marker>
        <marker id="arrow-retry" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 1 L 9 5 L 0 9 z" fill="#38BDF8" />
        </marker>
    </defs>
    <rect width="1280" height="320" fill="#0F172A" />
    <rect width="1280" height="320" fill="url(#lc-grid)" />
    <text x="80" y="50" fill="#94A3B8" font-size="12" font-family="system-ui, -apple-system, sans-serif" font-weight="700" letter-spacing="1">STATE LIFECYCLE</text>
    <path d="M 220 110 L 370 110" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrow-neutral)" />
    <path d="M 520 110 L 670 110" stroke="#EF4444" stroke-width="2" marker-end="url(#arrow-danger)" />
    <path d="M 750 140 L 750 200" stroke="#EF4444" stroke-width="2" marker-end="url(#arrow-danger)" />
    <path d="M 820 230 L 970 230" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrow-neutral)" />
    <path d="M 1050 200 L 1050 140" stroke="#10B981" stroke-width="2" marker-end="url(#arrow-success)" />
    <path d="M 980 110 L 220 110" fill="none" stroke="#10B981" stroke-width="2" marker-end="url(#arrow-success)" transform="translate(0, -60)"/>
    <path d="M 1050 80 L 1050 50 L 150 50 L 150 80" fill="none" stroke="#10B981" stroke-width="2" marker-end="url(#arrow-success)" stroke-linejoin="round" />
    <path d="M 450 140 L 450 200" stroke="#38BDF8" stroke-width="2" marker-end="url(#arrow-retry)" />
    <path d="M 450 260 L 450 280 L 150 280 L 150 140" fill="none" stroke="#10B981" stroke-width="2" marker-end="url(#arrow-success)" stroke-linejoin="round" />
    <g transform="translate(80, 80)">
        <rect width="140" height="60" fill="#1E293B" stroke="#10B981" stroke-width="1" rx="8" />
        <rect width="6" height="60" fill="#10B981" rx="3" />
        <text x="70" y="35" fill="#F8FAFC" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">Healthy</text>
    </g>
    <g transform="translate(380, 80)">
        <rect width="140" height="60" fill="#1E293B" stroke="#F59E0B" stroke-width="1" rx="8" />
        <rect width="6" height="60" fill="#F59E0B" rx="3" />
        <text x="70" y="35" fill="#F8FAFC" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">Degraded</text>
    </g>
    <g transform="translate(680, 80)">
        <rect width="140" height="60" fill="#1E293B" stroke="#EF4444" stroke-width="1" rx="8" />
        <rect width="6" height="60" fill="#EF4444" rx="3" />
        <text x="70" y="35" fill="#F8FAFC" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">Down</text>
    </g>
    <g transform="translate(380, 200)">
        <rect width="140" height="60" fill="#1E293B" stroke="#38BDF8" stroke-width="1" rx="8" stroke-dasharray="4,4" />
        <rect width="6" height="60" fill="#38BDF8" rx="3" />
        <text x="70" y="35" fill="#F8FAFC" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">Retry</text>
    </g>
    <g transform="translate(680, 200)">
        <rect width="140" height="60" fill="#1E293B" stroke="#EF4444" stroke-width="1" rx="8" />
        <rect width="6" height="60" fill="#EF4444" rx="3" />
        <text x="70" y="35" fill="#F8FAFC" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">Open</text>
    </g>
    <g transform="translate(980, 200)">
        <rect width="140" height="60" fill="#1E293B" stroke="#F59E0B" stroke-width="1" rx="8" />
        <rect width="6" height="60" fill="#F59E0B" rx="3" />
        <text x="70" y="35" fill="#F8FAFC" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">Acknowledged</text>
    </g>
    <g transform="translate(980, 80)">
        <rect width="140" height="60" fill="#1E293B" stroke="#10B981" stroke-width="1" rx="8" />
        <rect width="6" height="60" fill="#10B981" rx="3" />
        <text x="70" y="35" fill="#F8FAFC" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">Resolved</text>
    </g>
</svg>
