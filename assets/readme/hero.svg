        <g transform="translate(290, 200)">
            <rect width="140" height="40" fill="#0F172A" stroke="#334155" stroke-width="1" rx="6" />
            <rect width="4" height="40" fill="#A855F7" rx="2" />
            <text x="70" y="25" fill="#F8FAFC" font-size="13" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">Redis</text>
