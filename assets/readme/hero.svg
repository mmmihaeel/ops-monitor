            <rect width="4" height="40" fill="#F59E0B" rx="2" />
            <text x="70" y="25" fill="#F8FAFC" font-size="13" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">PostgreSQL</text>
