server:
  port: ${APP_PORT:3005}

spring:
  application:
    name: ops-monitor
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5437/ops_monitor}
    username: ${DATABASE_USERNAME:app}
    password: ${DATABASE_PASSWORD:app}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6384}
      timeout: 2s
      repositories:
        enabled: false
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

ops:
  monitor:
    api-auth:
      viewer-username: ${API_VIEWER_USERNAME:ops_viewer}
      viewer-password: ${API_VIEWER_PASSWORD:ops_viewer_password}
      operator-username: ${API_OPERATOR_USERNAME:ops_operator}
      operator-password: ${API_OPERATOR_PASSWORD:ops_operator_password}
      admin-username: ${API_ADMIN_USERNAME:ops_admin}
      admin-password: ${API_ADMIN_PASSWORD:ops_admin_password}
    management-auth:
      username: ${MANAGEMENT_USERNAME:ops_management}
      password: ${MANAGEMENT_PASSWORD:ops_management_password}
    cache:
      global-summary-ttl: ${CACHE_GLOBAL_SUMMARY_TTL:30s}
      service-status-ttl: ${CACHE_SERVICE_STATUS_TTL:20s}
    retry:
      lock-ttl: ${RETRY_LOCK_TTL:30s}
    status-policy:
      degraded-latency-threshold-ms: ${STATUS_DEGRADED_LATENCY_MS:1200}
      down-latency-threshold-ms: ${STATUS_DOWN_LATENCY_MS:5000}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
